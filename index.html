<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ایران خودرو | فروشگاه رسمی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E;
    --red-dark: #9B0020;
    --red-light: #E8294A;
    --gold: #D4A017;
    --gold-light: #F0C040;
    --dark: #0A0A0F;
    --dark2: #12121A;
    --dark3: #1A1A28;
    --dark4: #222235;
    --gray: #8888AA;
    --gray-light: #BBBBCC;
    --white: #F5F5FF;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --ton: #0088CC;
    --ton-light: #00AAFF;
    --green: #00C851;
    --orange: #FF8C00;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Vazirmatn', sans-serif;
    background: var(--dark);
    color: var(--white);
    overflow-x: hidden;
    cursor: default;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark2); }
  ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 3px; }

  /* LOADER */
  #loader {
    position: fixed; inset: 0;
    background: var(--dark);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    transition: opacity 0.6s, visibility 0.6s;
  }
  #loader.hidden { opacity: 0; visibility: hidden; }
  .loader-logo {
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--red);
    letter-spacing: 2px;
    animation: pulse 1s ease-in-out infinite alternate;
  }
  .loader-bar {
    width: 200px; height: 3px;
    background: var(--dark3);
    border-radius: 2px;
    overflow: hidden;
  }
  .loader-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--gold));
    border-radius: 2px;
    animation: loadbar 1.8s ease-in-out forwards;
  }
  @keyframes loadbar { 0%{width:0} 100%{width:100%} }
  @keyframes pulse { from{opacity:0.6} to{opacity:1} }

  /* HEADER */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    padding: 0 40px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-logo {
    display: flex; align-items: center; gap: 12px;
    text-decoration: none;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--red), var(--red-dark));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1.1rem;
    color: white;
    box-shadow: 0 4px 15px rgba(200,16,46,0.4);
  }
  .logo-text { font-weight: 800; font-size: 1.2rem; color: var(--white); }
  .logo-sub { font-size: 0.65rem; color: var(--gray); margin-top: -2px; }

  nav { display: flex; align-items: center; gap: 8px; }
  nav a {
    color: var(--gray-light);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 8px 14px;
    border-radius: 8px;
    transition: all 0.2s;
    font-weight: 500;
  }
  nav a:hover { color: var(--white); background: var(--glass); }
  nav a.active { color: var(--red-light); }

  .header-actions { display: flex; align-items: center; gap: 10px; }
  .btn-login {
    padding: 8px 20px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--white);
    border-radius: 8px;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-login:hover { border-color: var(--red); color: var(--red-light); }
  .btn-cart {
    position: relative;
    width: 40px; height: 40px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.2s;
  }
  .btn-cart:hover { background: var(--red); border-color: var(--red); }
  .cart-badge {
    position: absolute; top: -6px; right: -6px;
    background: var(--gold);
    color: var(--dark);
    width: 18px; height: 18px;
    border-radius: 50%;
    font-size: 0.7rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    padding-top: 70px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 50% 120%, rgba(200,16,46,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 20%, rgba(212,160,23,0.08) 0%, transparent 60%),
      linear-gradient(180deg, var(--dark) 0%, var(--dark2) 100%);
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 70%);
  }
  .hero-content {
    position: relative;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
    width: 100%;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(200,16,46,0.15);
    border: 1px solid rgba(200,16,46,0.3);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    color: var(--red-light);
    margin-bottom: 20px;
    animation: fadeInUp 0.6s ease both;
  }
  .hero-badge span { width: 6px; height: 6px; background: var(--red); border-radius: 50%; animation: blink 1s ease infinite alternate; }
  @keyframes blink { from{opacity:0.4} to{opacity:1} }
  .hero-title {
    font-size: 3.5rem;
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 20px;
    animation: fadeInUp 0.6s 0.1s ease both;
  }
  .hero-title .accent { color: var(--red-light); }
  .hero-title .gold { color: var(--gold-light); }
  .hero-desc {
    color: var(--gray);
    font-size: 1rem;
    line-height: 1.7;
    margin-bottom: 32px;
    animation: fadeInUp 0.6s 0.2s ease both;
  }
  .hero-btns {
    display: flex; gap: 14px;
    animation: fadeInUp 0.6s 0.3s ease both;
  }
  .btn-primary {
    padding: 14px 28px;
    background: linear-gradient(135deg, var(--red), var(--red-dark));
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 8px 25px rgba(200,16,46,0.4);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(200,16,46,0.5); }
  .btn-secondary {
    padding: 14px 28px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--white);
    border-radius: 12px;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }

  .hero-stats {
    display: flex; gap: 30px;
    margin-top: 40px;
    padding-top: 30px;
    border-top: 1px solid var(--glass-border);
    animation: fadeInUp 0.6s 0.4s ease both;
  }
  .stat { text-align: center; }
  .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--white); }
  .stat-num span { color: var(--red-light); }
  .stat-label { font-size: 0.75rem; color: var(--gray); margin-top: 2px; }

  .hero-visual {
    position: relative;
    animation: fadeInRight 0.8s 0.2s ease both;
  }
  .hero-car-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 30px;
    position: relative;
    overflow: hidden;
  }
  .hero-car-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 0%, rgba(200,16,46,0.1) 0%, transparent 60%);
  }
  .car-display {
    width: 100%;
    height: 220px;
    background: linear-gradient(135deg, var(--dark3), var(--dark4));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7rem;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .car-display::after {
    content: '';
    position: absolute;
    bottom: 0; left: 10%; right: 10%;
    height: 30px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.6) 0%, transparent 70%);
  }
  .featured-tag {
    position: absolute; top: 15px; right: 15px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .car-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
  .car-specs-row {
    display: flex; gap: 12px; margin-bottom: 15px;
  }
  .car-spec {
    font-size: 0.75rem; color: var(--gray);
    background: var(--dark3);
    padding: 4px 10px;
    border-radius: 6px;
  }
  .car-price-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .car-price { font-size: 1.3rem; font-weight: 800; color: var(--red-light); }
  .car-price-old { font-size: 0.8rem; color: var(--gray); text-decoration: line-through; margin-top: 2px; }
  .discount-badge {
    background: rgba(200,16,46,0.15);
    border: 1px solid rgba(200,16,46,0.3);
    color: var(--red-light);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 600;
  }

  @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeInRight { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }

  /* FESTIVAL BANNER */
  .festival {
    padding: 0 40px;
    max-width: 1200px;
    margin: 60px auto;
  }
  .festival-title-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .section-title {
    font-size: 1.5rem;
    font-weight: 800;
  }
  .section-title span { color: var(--red-light); }
  .see-all {
    color: var(--gray);
    font-size: 0.85rem;
    cursor: pointer;
    transition: color 0.2s;
  }
  .see-all:hover { color: var(--red-light); }

  .festival-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .festival-card {
    border-radius: 20px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s;
  }
  .festival-card:hover { transform: translateY(-6px); }
  .festival-card.summer {
    background: linear-gradient(135deg, #1a2a4a 0%, #0d1a33 100%);
    border: 1px solid rgba(0,136,204,0.3);
  }
  .festival-card.autumn {
    background: linear-gradient(135deg, #2a1a0a 0%, #1a0d00 100%);
    border: 1px solid rgba(212,100,0,0.3);
  }
  .festival-card.winter {
    background: linear-gradient(135deg, #0a1a2a 0%, #050d1a 100%);
    border: 1px solid rgba(100,150,255,0.3);
  }
  .festival-card.spring {
    background: linear-gradient(135deg, #0a2a0a 0%, #051a05 100%);
    border: 1px solid rgba(0,200,80,0.3);
  }
  .festival-emoji { font-size: 2.5rem; margin-bottom: 10px; display: block; }
  .festival-season { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
  .festival-card.summer .festival-season { color: #60AAFF; }
  .festival-card.autumn .festival-season { color: #FF8C40; }
  .festival-card.winter .festival-season { color: #80A0FF; }
  .festival-card.spring .festival-season { color: #40DD80; }
  .festival-discount { font-size: 2rem; font-weight: 900; }
  .festival-card.summer .festival-discount { color: #60AAFF; }
  .festival-card.autumn .festival-discount { color: #FF8C40; }
  .festival-card.winter .festival-discount { color: #80A0FF; }
  .festival-card.spring .festival-discount { color: #40DD80; }
  .festival-desc { font-size: 0.75rem; color: var(--gray); margin-top: 6px; }
  .festival-timer {
    display: flex; gap: 6px; margin-top: 14px;
  }
  .timer-block {
    background: rgba(0,0,0,0.3);
    border-radius: 6px;
    padding: 4px 8px;
    text-align: center;
    min-width: 36px;
  }
  .timer-num { font-size: 1rem; font-weight: 700; }
  .timer-label { font-size: 0.55rem; color: var(--gray); }

  /* PRODUCTS */
  .products-section {
    padding: 0 40px;
    max-width: 1200px;
    margin: 0 auto 60px;
  }
  .products-tabs {
    display: flex; gap: 8px; margin-bottom: 28px;
    border-bottom: 1px solid var(--glass-border);
    padding-bottom: 16px;
  }
  .tab {
    padding: 8px 20px;
    border-radius: 8px;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--gray);
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--red);
    color: white;
  }
  .tab:hover:not(.active) { color: var(--white); background: var(--glass); }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .product-card {
    background: var(--dark2);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.3s;
    cursor: pointer;
    position: relative;
  }
  .product-card:hover {
    border-color: rgba(200,16,46,0.4);
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  .product-img {
    height: 180px;
    background: linear-gradient(135deg, var(--dark3), var(--dark4));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    position: relative;
    overflow: hidden;
  }
  .product-img::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 120%, rgba(200,16,46,0.08) 0%, transparent 60%);
  }
  .product-badges {
    position: absolute; top: 12px; right: 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .badge {
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 700;
  }
  .badge-new { background: rgba(0,200,80,0.15); color: var(--green); border: 1px solid rgba(0,200,80,0.3); }
  .badge-sale { background: rgba(200,16,46,0.15); color: var(--red-light); border: 1px solid rgba(200,16,46,0.3); }
  .badge-pre { background: rgba(212,160,23,0.15); color: var(--gold-light); border: 1px solid rgba(212,160,23,0.3); }
  .badge-hot { background: rgba(255,100,0,0.15); color: #FF8040; border: 1px solid rgba(255,100,0,0.3); }
  .wishlist-btn {
    position: absolute; top: 12px; left: 12px;
    width: 32px; height: 32px;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0;
  }
  .product-card:hover .wishlist-btn { opacity: 1; }
  .wishlist-btn:hover { background: rgba(200,16,46,0.3); border-color: var(--red); }

  .product-info { padding: 18px; }
  .product-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
  .product-eng { font-size: 0.75rem; color: var(--gray); margin-bottom: 10px; direction: ltr; text-align: right; }
  .product-specs {
    display: flex; gap: 8px; margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .spec-tag {
    font-size: 0.7rem;
    background: var(--dark3);
    color: var(--gray-light);
    padding: 3px 8px;
    border-radius: 5px;
  }
  .product-pricing { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; }
  .price-main { font-size: 1.15rem; font-weight: 800; color: var(--white); }
  .price-main span { font-size: 0.75rem; color: var(--gray); font-weight: 400; }
  .price-old { font-size: 0.8rem; color: var(--gray); text-decoration: line-through; }
  .price-discount { font-size: 0.8rem; color: var(--red-light); font-weight: 600; }
  .ton-price {
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,136,204,0.1);
    border: 1px solid rgba(0,136,204,0.2);
    border-radius: 8px;
    padding: 6px 10px;
    margin-bottom: 14px;
  }
  .ton-icon { font-size: 1rem; }
  .ton-label { font-size: 0.75rem; color: #60CCFF; }
  .ton-amount { font-size: 0.85rem; font-weight: 700; color: #60CCFF; margin-right: auto; }
  .product-actions { display: flex; gap: 8px; }
  .btn-buy {
    flex: 1;
    padding: 10px;
    background: linear-gradient(135deg, var(--red), var(--red-dark));
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-buy:hover { box-shadow: 0 6px 20px rgba(200,16,46,0.4); }
  .btn-buy.pre {
    background: linear-gradient(135deg, var(--gold), #AA7800);
  }
  .btn-buy.pre:hover { box-shadow: 0 6px 20px rgba(212,160,23,0.4); }
  .btn-detail {
    width: 40px;
    background: var(--dark3);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .btn-detail:hover { background: var(--dark4); border-color: var(--gray); }

  /* PRESALE SECTION */
  .presale-section {
    padding: 0 40px;
    max-width: 1200px;
    margin: 0 auto 60px;
  }
  .presale-banner {
    background: linear-gradient(135deg, var(--dark2) 0%, var(--dark3) 100%);
    border: 1px solid rgba(212,160,23,0.3);
    border-radius: 24px;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }
  .presale-banner::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 50% 80% at 100% 50%, rgba(212,160,23,0.08) 0%, transparent 70%);
  }
  .presale-header {
    display: flex; align-items: center; gap: 20px; margin-bottom: 30px;
  }
  .presale-icon {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, var(--gold), #AA7800);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    box-shadow: 0 8px 20px rgba(212,160,23,0.4);
  }
  .presale-header-text h2 { font-size: 1.6rem; font-weight: 800; }
  .presale-header-text p { color: var(--gray); font-size: 0.9rem; margin-top: 4px; }
  .presale-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .presale-card {
    background: var(--dark);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 20px;
    transition: all 0.3s;
    cursor: pointer;
  }
  .presale-card:hover { border-color: rgba(212,160,23,0.4); transform: translateY(-3px); }
  .presale-car-img {
    height: 110px;
    background: var(--dark3);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    margin-bottom: 14px;
  }
  .presale-car-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .presale-status {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .status-text { font-size: 0.75rem; color: var(--gold-light); }
  .presale-progress {
    background: var(--dark3);
    height: 6px; border-radius: 3px;
    overflow: hidden; margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 3px;
    transition: width 1s ease;
  }
